name: Build HeartsConnect Desktop (.exe)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'desktop_app/**'
  workflow_dispatch:   # manual trigger from Actions tab

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pywebview pyinstaller pillow

      - name: Convert icon.png -> icon.ico
        run: |
          python - <<'EOF'
          from PIL import Image
          img = Image.open("icon.png").convert("RGBA")
          img.save("desktop_app/icon.ico", format="ICO", sizes=[
              (256,256),(128,128),(64,64),(48,48),(32,32),(16,16)
          ])
          print("icon.ico created")
          EOF

      - name: Build HeartsConnect.exe
        run: |
          cd desktop_app
          pyinstaller --onefile --windowed --icon=icon.ico --name=HeartsConnect main.py

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeartsConnect-Windows
          path: desktop_app/dist/HeartsConnect.exe
          retention-days: 30
